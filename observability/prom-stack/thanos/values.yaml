# ======================================================================
# Store Gateway component
# Exposes historical blocks from the object store via the Store API.
# Query routes requests for data older than the local Receive retention
# to this component.
# ======================================================================
# Store Gateway component — serves historical blocks from the object store over the Store API.
storegateway:
  # -- Enable the Store Gateway StatefulSet.
  enabled: true

  # -- Number of Store Gateway pod replicas. Two or more is recommended for HA.
  # In sharded mode this is the replica count *per shard*.
  replicaCount: 2

  # -- Minimum number of seconds for which a newly created Store Gateway Pod must
  # be Running and Ready, without any container crashing, before it is considered
  # available during a rolling update (StatefulSet `spec.minReadySeconds`).
  # Defaults to 0 (available as soon as Ready); the field is omitted when 0.
  # See https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#minimum-ready-seconds
  minReadySeconds: 0

  # Sharded Store Gateway topology. When enabled, the chart renders one
  # StatefulSet per shard (named `<fullname>-storegateway-<index>`) so that each
  # shard serves a subset of the object-storage blocks instead of every replica
  # loading the full block set. All shard pods keep the
  # `app.kubernetes.io/component: storegateway` label, so the (headless) Service,
  # ServiceMonitor and Query DNS-SRV discovery automatically fan out across every
  # shard with no extra configuration. The total number of shards is the
  # cross-product of `timePartitioning` entries and `hashPartitioning.shards`.
  # NOTE: changing the shard count or time partitions renumbers shards and
  # triggers StatefulSet recreation. See https://thanos.io/tip/components/store.md/#time-based-partitioning
  sharded:
    # -- Enable sharded Store Gateway deployments (one StatefulSet per shard).
    enabled: false
    # Hash-based partitioning. Distributes blocks across shards using a
    # `hashmod` relabel on `__block_id`.
    hashPartitioning:
      # -- Number of hash shards. A value greater than 1 enables hash
      # partitioning; the default of 1 disables it (a single hash shard is
      # equivalent to no hash partitioning — use time partitioning only).
      shards: 1
      # -- Extra relabeling rules prepended to the generated hashmod/keep pair
      # in each shard's `--selector.relabel-config` (e.g. to drop blocks by
      # external labels before hashing).
      # @default -- []
      extraRelabelingConfigs: []
    # -- Time-based partitioning. A list of `{ min, max }` ranges; each entry
    # becomes a shard (or, combined with `hashPartitioning.shards`, a set of
    # shards) restricted to that range via `--min-time` / `--max-time`. Values
    # accept Thanos time formats (RFC3339 or relative durations like `-6w`); an
    # empty string leaves that bound open.
    # @default -- []
    timePartitioning: []

  # Kubernetes Service configuration for the Store Gateway.
  service:
    # -- Kubernetes Service type for the Store Gateway.
    type: ClusterIP
    # -- gRPC Store API port exposed by the Store Gateway Service.
    grpcPort: 10901
    # -- HTTP port exposed by the Store Gateway Service.
    httpPort: 10902
    # -- Extra annotations for the Store Gateway Service.
    # @default -- {}
    annotations: {}
    # -- Extra labels for the Store Gateway Service.
    # @default -- {}
    labels: {}

  # Kubernetes Ingress configuration for the Store Gateway endpoint.
  ingress:
    # -- Deprecated. Use `storegateway.ingress.http.enabled` instead.
    enabled: false
    # -- Deprecated. Use `storegateway.ingress.http.className` instead.
    className: ""
    # -- Deprecated. Use `storegateway.ingress.http.annotations` instead.
    # @default -- {}
    annotations: {}
    # Deprecated. Use `storegateway.ingress.http.hosts` instead.
    hosts:
      - host: thanos-store.local
        paths:
          - path: /
            pathType: Prefix
    # -- Deprecated. Use `storegateway.ingress.http.tls` instead.
    # @default -- []
    tls: []

    # If this is enabled, none of the deprecated values above will be used.
    http:
      # -- Enable a Kubernetes Ingress for the Store Gateway HTTP endpoint.
      enabled: false
      # -- Ingress class name for Store Gateway HTTP endpoint (e.g. nginx, traefik).
      className: ""
      # -- Extra annotations for the Store Gateway HTTP Ingress.
      # @default -- {}
      annotations: {}
      # Host rules for the Store Gateway HTTP Ingress.
      hosts:
        - host: thanos-store.local
          paths:
            - path: /
              pathType: Prefix
      # -- TLS configuration for the Store Gateway HTTP Ingress.
      # @default -- []
      tls: []

    grpc:
      # -- Enable a Kubernetes Ingress for the Store Gateway gRPC endpoint.
      # Note this is independent of ingress.enabled that is for the HTTP ingress.
      enabled: false
      # -- Ingress class name for Store Gateway gRPC endpoint (e.g. nginx, traefik).
      className: ""
      # -- Extra annotations for the Store Gateway gRPC Ingress.
      # @default -- {}
      annotations: {}
      # Host rules for the Store Gateway gRPC Ingress.
      hosts:
        - host: thanos-store-grpc.local
          paths:
            - path: /
              pathType: Prefix
      # -- TLS configuration for the Store Gateway gRPC Ingress.
      # @default -- []
      tls: []

  # Gateway API HTTPRoute configuration for the Store Gateway HTTP endpoint.
  httpRoute:
    # -- Enable a Gateway API HTTPRoute for the Store Gateway HTTP endpoint.
    enabled: false
    # -- Annotations for the Store Gateway HTTPRoute resource.
    # @default -- {}
    annotations: {}
    # -- Gateway parentRefs for the Store Gateway HTTPRoute.
    # @default -- []
    parentRefs: []
    # Example:
    # parentRefs:
    #   - name: my-gateway
    #     namespace: gateway-system
    #     sectionName: https
    # -- Hostnames to match on the Store Gateway HTTPRoute.
    # @default -- []
    hostnames: []
    # Example:
    # hostnames:
    #   - storegateway.example.com
    # -- Gateway matches for the Store Gateway HTTPRoute rules.
    # @default -- []
    matches: []
    # Example:
    # matches:
    #   - path:
    #       type: PathPrefix
    #       value: /
    # -- Gateway filters for the Store Gateway HTTPRoute rules.
    # @default -- []
    filters: []
    # Example:
    # filters:
    #   - type: RequestHeaderModifier
    #     requestHeaderModifier:
    #       add:
    #         - name: X-Forwarded-Proto
    #           value: https
    # -- Additional custom rules for Store Gateway HTTPRoute
    # Each item should be a complete HTTPRouteRule object with
    # its own backendRefs, matches, filters, etc.
    # @default -- []
    extraRules: []
    # Example:
    # extraRules:
    #   - backendRefs:
    #       - name: other-service
    #         port: 80
    #     matches:
    #       - path:
    #           type: PathPrefix
    #           value: /api

  # Gateway API GRPCRoute configuration for the Store Gateway gRPC Store API.
  grpcRoute:
    # -- Enable a Gateway API GRPCRoute for the Store Gateway gRPC Store API endpoint.
    enabled: false
    # -- Annotations for the Store Gateway GRPCRoute resource.
    # @default -- {}
    annotations: {}
    # -- Gateway parentRefs for the Store Gateway GRPCRoute.
    # @default -- []
    parentRefs: []
    # -- Hostnames to match on the Store Gateway GRPCRoute.
    # @default -- []
    hostnames: []

  # HorizontalPodAutoscaler configuration for the Store Gateway.
  autoscaling:
    # -- Enable HorizontalPodAutoscaler for the Store Gateway.
    enabled: false
    # -- Minimum number of Store Gateway replicas.
    minReplicas: 2
    # -- Maximum number of Store Gateway replicas.
    maxReplicas: 6
    # -- Target CPU utilisation percentage for Store Gateway autoscaling.
    targetCPUUtilizationPercentage: 80
    # -- Target memory utilisation percentage for Store Gateway autoscaling. Null disables memory-based scaling.
    targetMemoryUtilizationPercentage: null

  # PersistentVolumeClaim configuration for the Store Gateway index cache.
  persistence:
    # -- Enable a PersistentVolumeClaim for the Store Gateway index cache and chunk store.
    enabled: true
    # -- Storage capacity for the Store Gateway PVC.
    size: 10Gi
    # -- StorageClass name for the Store Gateway PVC. Empty uses the cluster default.
    storageClass: "local-path"
    # -- [Volume attributes class](https://kubernetes.io/docs/concepts/storage/volume-attributes-classes/) name for the Store Gateway PVC. Requires Kubernetes 1.31+ ([with feature gate](https://kubernetes.io/docs/reference/command-line-tools-reference/feature-gates/#feature-gates-for-graduated-or-deprecated-features)) or 1.36+. Chart will fail if provided but not supported by cluster.
    volumeAttributesClassName: ""
    # Access modes for the Store Gateway PVC.
    accessModes:
      - ReadWriteOnce

  # -- Optional caching bucket configuration (e.g. Memcached) that wraps the
  # object store to reduce the number of object store API calls.
  # Provide as an inline YAML string. See https://thanos.io/tip/components/store.md/#caching-bucket
  cachingBucketConfig: ""

  # -- Resource requests and limits for the Store Gateway container.
  # @default -- {}
  resources: {}

  # -- Additional CLI arguments appended to the `thanos store` command.
  # @default -- []
  extraArgs:
      - --log.level=debug

  # Pod security context for Store Gateway pods. Overrides global.podSecurityContext.
  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

  # -- Container security context for Store Gateway. Overrides global.containerSecurityContext.
  # @default -- {}
  containerSecurityContext: {}

  # -- DNS configuration for Store Gateway pods. Overrides global.dnsConfig.
  # @default -- {}
  dnsConfig: {}

  # -- Extra environment variables injected into the Store Gateway container.
  # @default -- []
  extraEnv: []

  # -- Extra environment variable sources for the Store Gateway container.
  # @default -- []
  extraEnvFrom: []

  # -- Extra init containers for Store Gateway pods.
  # @default -- []
  extraInitContainers: []

  # -- Extra sidecar containers for Store Gateway pods.
  # @default -- []
  extraContainers: []

  # Health and readiness probe configuration for the Store Gateway.
  probes:
    # Readiness probe for the Store Gateway.
    readiness:
      # -- Enable the readiness probe for the Store Gateway.
      enabled: true
      # -- HTTP path checked by the Store Gateway readiness probe.
      path: /-/ready
      # -- Seconds to wait before starting the Store Gateway readiness probe.
      initialDelaySeconds: 5
      # -- How often (seconds) to run the Store Gateway readiness probe.
      periodSeconds: 10
      # -- Seconds after which the Store Gateway readiness probe times out.
      timeoutSeconds: 5
      # -- Consecutive failures before the Store Gateway pod is marked not-ready.
      failureThreshold: 6
      # -- Consecutive successes before the Store Gateway pod is marked ready.
      successThreshold: 1
    # Liveness probe for the Store Gateway.
    liveness:
      # -- Enable the liveness probe for the Store Gateway.
      enabled: true
      # -- HTTP path checked by the Store Gateway liveness probe.
      path: /-/healthy
      # -- Seconds to wait before starting the Store Gateway liveness probe.
      initialDelaySeconds: 30
      # -- How often (seconds) to run the Store Gateway liveness probe.
      periodSeconds: 10
      # -- Seconds after which the Store Gateway liveness probe times out.
      timeoutSeconds: 5
      # -- Consecutive failures before the Store Gateway container is restarted.
      failureThreshold: 6
      # -- Consecutive successes before the Store Gateway container is considered live.
      successThreshold: 1
    # Startup probe for the Store Gateway.
    startup:
      # -- Enable the startup probe for the Store Gateway.
      enabled: true
      # -- HTTP path checked by the Store Gateway startup probe.
      path: /-/ready
      # -- Seconds to wait before starting the Store Gateway startup probe.
      initialDelaySeconds: 20
      # -- How often (seconds) to run the Store Gateway startup probe.
      periodSeconds: 10
      # -- Seconds after which the Store Gateway startup probe times out.
      timeoutSeconds: 5
      # -- Consecutive failures during Store Gateway startup before the container is killed.
      failureThreshold: 120
      # -- Consecutive successes before the Store Gateway startup probe is considered passed.
      successThreshold: 1

  # -- Node selector for Store Gateway pod scheduling.
  # @default -- {}
  nodeSelector: {}

  # -- Tolerations for Store Gateway pod scheduling.
  # @default -- []
  tolerations: []

  # -- Affinity rules for Store Gateway pod scheduling.
  # @default -- {}
  affinity: {}

  # -- Topology spread constraints for Store Gateway pods.
  # @default -- []
  topologySpreadConstraints: []

  # -- Priority class name for Store Gateway pods.
  priorityClassName: ""

  # -- Extra volumes for Store Gateway pods.
  # @default -- []
  extraVolumes: []

  # -- Extra volume mounts for the Store Gateway container.
  # @default -- []
  extraVolumeMounts: []

  # -- Extra annotations applied to Store Gateway resources.
  # @default -- {}
  annotations: {}

  # -- Extra labels applied to Store Gateway resources.
  # @default -- {}
  labels: {}

  # -- Extra labels applied to Store Gateway pods (e.g. for workload identity).
  # @default -- {}
  podLabels: {}

  # Prometheus Operator ServiceMonitor configuration for the Store Gateway.
  serviceMonitor:
    # -- Enable a Prometheus Operator ServiceMonitor for the Store Gateway.
    enabled: false
    # -- Extra labels for the Store Gateway ServiceMonitor.
    # @default -- {}
    labels: {}
    # -- Extra annotations for the Store Gateway ServiceMonitor.
    # @default -- {}
    annotations: {}
    # -- Scrape interval for the Store Gateway. Empty uses the Prometheus operator default.
    interval: ""
    # -- Scrape timeout for the Store Gateway. Empty uses the Prometheus operator default.
    scrapeTimeout: ""
    # -- Scrape scheme for the Store Gateway (http or https).
    scheme: ""
    # -- TLS configuration for Store Gateway scraping.
    # @default -- {}
    tlsConfig: {}
    # -- Relabeling rules applied before Store Gateway metrics are ingested.
    # @default -- []
    relabelings: []
    # -- Metric relabeling rules applied after Store Gateway metrics are ingested.
    # @default -- []
    metricRelabelings: []

  # PodDisruptionBudget configuration for the Store Gateway.
  pdb:
    # -- Enable a PodDisruptionBudget for the Store Gateway.
    enabled: false
    # -- (int or string) Minimum available Store Gateway pods during a disruption.
    minAvailable: ""
    # -- (int or string) Maximum unavailable Store Gateway pods during a disruption.
    maxUnavailable: ""

# ======================================================================
# Receive component
# Remote-write endpoint that accepts Prometheus remote_write traffic,
# stores samples in a local TSDB WAL, and ships blocks to the object store.
# Supports sharded (hashring) topologies for high-throughput ingestion.
# ======================================================================
# Receive component — remote-write ingestion endpoint that ships blocks to the object store.
receive:
  # -- Enable the Receive StatefulSet.
  enabled: true

  # @schema
  # enum:
  #   - standalone
  #   - split
  # @schema
  # -- Receive deployment topology. One of:
  # `standalone` — single workload that both routes and ingests (RouterIngestor mode);
  # `split` — separate Router (Deployment) and Ingester (StatefulSet) workloads,
  # following the receive split proposal (https://thanos.io/tip/proposals-accepted/202012-receive-split.md).
  #
  # Field shape depends on mode:
  #   - `standalone`: configure the workload directly via top-level `receive.*`
  #     fields (replicaCount, tsdb, service, persistence, etc.). `receive.ingester`
  #     and `receive.router` are ignored.
  #   - `split`: configure each workload via `receive.ingester.*` and
  #     `receive.router.*`. Top-level `receive.*` fields are ignored. The schema
  #     requires both `ingester` and `router` to be populated in this mode.
  mode: standalone

  # -- Number of Receive pod replicas. Minimum 3 is recommended for
  # replication factor 2 (write quorum = floor(replicaCount/2)+1).
  # In `split` mode this controls the Ingester StatefulSet replica count.
  replicaCount: 3

  # -- Minimum number of seconds for which a newly created Receive Pod must be
  # Running and Ready, without any container crashing, before it is considered
  # available during a rolling update (StatefulSet `spec.minReadySeconds`).
  # Defaults to 0 (available as soon as Ready); the field is omitted when 0.
  # In `split` mode set `receive.ingester.minReadySeconds` instead.
  # See https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#minimum-ready-seconds
  minReadySeconds: 0

  # -- Optional HTTP header name used to segregate tenants in multi-tenant setups.
  # When set, Receive routes write requests to the correct tenant shard based on this header.
  tenancyHeader: ""

  # TSDB settings for the local WAL before blocks are uploaded to the object store.
  tsdb:
    # -- How long Receive keeps data in the local WAL before uploading to the object store.
    retention: 24h
    # -- Enable WAL compression to reduce disk I/O and storage usage.
    walCompression: true

  # Hashring topology configuration for the Receive StatefulSet.
  hashrings:
    # Auto-generated single-ring configuration derived from the StatefulSet pod DNS names.
    autogen:
      # -- Auto-generate a single default hashring whose endpoints are derived
      # from the StatefulSet pod DNS names:
      # `<pod-0>.<headless-svc>:10901 ... <pod-N>.<headless-svc>:10901`.
      enabled: true
      # -- Name of the auto-generated hashring.
      name: default
    # -- Optional static hashring configuration. When non-empty this overrides
    # `autogen` and gives full control over ring topology.
    # @default -- []
    static: []
    # Example:
    # static:
    #   - hashring: default
    #     endpoints:
    #       - thanos-receive-0.thanos-receive:10901
    #       - thanos-receive-1.thanos-receive:10901

  # Kubernetes Service configuration for the Receive component.
  service:
    # -- Kubernetes Service type for the Receive component.
    type: ClusterIP
    # -- gRPC Store API port exposed by the Receive Service.
    grpcPort: 10901
    # -- HTTP port exposed by the Receive Service.
    httpPort: 10902
    # -- Remote-write ingestion port exposed by the Receive Service.
    remoteWritePort: 10908
    # -- Extra annotations for the Receive Service.
    # @default -- {}
    annotations: {}
    # -- Extra labels for the Receive Service.
    # @default -- {}
    labels: {}

  # Kubernetes Ingress configuration for the Receive endpoint.
  ingress:
    # -- Deprecated. Use `receive.ingress.http.enabled` instead.
    enabled: false
    # -- Deprecated. Use `receive.ingress.http.className` instead.
    className: ""
    # -- Deprecated. Use `receive.ingress.http.annotations` instead.
    # @default -- {}
    annotations: {}
    # Deprecated. Use `receive.ingress.http.hosts` instead.
    hosts:
      - host: thanos-receive.local
        paths:
          - path: /
            pathType: Prefix
    # -- Deprecated. Use `receive.ingress.http.tls` instead.
    # @default -- []
    tls: []

    # If this is enabled, none of the deprecated values above will be used.
    http:
      # -- Enable a Kubernetes Ingress for the Receive HTTP endpoint.
      enabled: false
      # -- Ingress class name for Receive HTTP endpoint (e.g. nginx, traefik).
      className: ""
      # -- Extra annotations for the Receive HTTP Ingress.
      # @default -- {}
      annotations: {}
      # Host rules for the Receive HTTP Ingress.
      hosts:
        - host: thanos-receive.local
          paths:
            - path: /
              pathType: Prefix
      # -- TLS configuration for the Receive HTTP Ingress.
      # @default -- []
      tls: []

    grpc:
      # -- Enable a Kubernetes Ingress for the Receive gRPC endpoint.
      # Note this is independent of ingress.enabled that is for the HTTP ingress.
      enabled: false
      # -- Ingress class name for Receive gRPC endpoint (e.g. nginx, traefik).
      className: ""
      # -- Extra annotations for the Receive gRPC Ingress.
      # @default -- {}
      annotations: {}
      # Host rules for the Receive gRPC Ingress.
      hosts:
        - host: thanos-receive-grpc.local
          paths:
            - path: /
              pathType: Prefix
      # -- TLS configuration for the Receive gRPC Ingress.
      # @default -- []
      tls: []

    remoteWrite:
      # -- Enable a Kubernetes Ingress for the Receive remote-write endpoint.
      enabled: false
      # -- Ingress class name for Receive remote-write endpoint (e.g. nginx, traefik).
      className: ""
      # -- Extra annotations for the Receive remote-write Ingress.
      # @default -- {}
      annotations: {}
      # Host rules for the Receive remote-write Ingress.
      hosts:
        - host: thanos-receive-remote-write.local
          paths:
            - path: /
              pathType: Prefix
      # -- TLS configuration for the Receive remote-write Ingress.
      # @default -- []
      tls: []

  # Gateway API HTTPRoute configuration for the Receive HTTP endpoint.
  httpRoute:
    # -- Enable a Gateway API HTTPRoute for the Receive HTTP endpoint.
    enabled: false
    # -- Annotations for the Receive HTTPRoute resource.
    # @default -- {}
    annotations: {}
    # -- Gateway parentRefs for the Receive HTTPRoute.
    # @default -- []
    parentRefs: []
    # Example:
    # parentRefs:
    #   - name: my-gateway
    #     namespace: gateway-system
    #     sectionName: https
    # -- Hostnames to match on the Receive HTTPRoute.
    # @default -- []
    hostnames: []
    # Example:
    # hostnames:
    #   - receive.example.com
    # -- Gateway matches for the Receive HTTPRoute rules.
    # @default -- []
    matches: []
    # Example:
    # matches:
    #   - path:
    #       type: PathPrefix
    #       value: /
    # -- Gateway filters for the Receive HTTPRoute rules.
    # @default -- []
    filters: []
    # Example:
    # filters:
    #   - type: RequestHeaderModifier
    #     requestHeaderModifier:
    #       add:
    #         - name: X-Forwarded-Proto
    #           value: https
    # -- Additional custom rules for Receive HTTPRoute
    # Each item should be a complete HTTPRouteRule object with
    # its own backendRefs, matches, filters, etc.
    # @default -- []
    extraRules: []
    # Example:
    # extraRules:
    #   - backendRefs:
    #       - name: other-service
    #         port: 80
    #     matches:
    #       - path:
    #           type: PathPrefix
    #           value: /api

  # Gateway API GRPCRoute configuration for the Receive gRPC Store API.
  grpcRoute:
    # -- Enable a Gateway API GRPCRoute for the Receive gRPC Store API endpoint.
    enabled: false
    # -- Annotations for the Receive GRPCRoute resource.
    # @default -- {}
    annotations: {}
    # -- Gateway parentRefs for the Receive GRPCRoute.
    # @default -- []
    parentRefs: []
    # -- Hostnames to match on the Receive GRPCRoute.
    # @default -- []
    hostnames: []

  # VerticalPodAutoscaler configuration for the Receive StatefulSet.
  vpa:
    # -- Enable a VerticalPodAutoscaler for the Receive StatefulSet.
    enabled: true
    # -- Kubernetes workload kind targeted by the Receive VPA.
    targetKind: StatefulSet
    # -- VPA update mode for Receive. One of Auto, Off, or Initial.
    updateMode: Auto
    # Minimum resource limits enforced by the Receive VPA.
    minAllowed:
      # -- Minimum CPU resource enforced by the Receive VPA.
      cpu: 500m
      # -- Minimum memory resource enforced by the Receive VPA.
      memory: 512Mi
    # Maximum resource limits enforced by the Receive VPA.
    maxAllowed:
      # -- Maximum CPU resource enforced by the Receive VPA.
      cpu: "4"
      # -- Maximum memory resource enforced by the Receive VPA.
      memory: 8Gi

  # PersistentVolumeClaim configuration for the Receive TSDB WAL.
  persistence:
    # -- Enable a PersistentVolumeClaim for the Receive TSDB WAL.
    enabled: true
    # -- Storage capacity for the Receive PVC.
    # Should be sized to hold at least `tsdb.retention` worth of data.
    size: 10Gi
    # -- StorageClass name for the Receive PVC. Empty uses the cluster default.
    storageClass: "local-path"
    # -- [Volume attributes class](https://kubernetes.io/docs/concepts/storage/volume-attributes-classes/) name for the Receive PVC. Requires Kubernetes 1.31+ ([with feature gate](https://kubernetes.io/docs/reference/command-line-tools-reference/feature-gates/#feature-gates-for-graduated-or-deprecated-features)) or 1.36+. Chart will fail if provided but not supported by cluster.
    volumeAttributesClassName: ""
    # Access modes for the Receive PVC.
    accessModes:
      - ReadWriteOnce

  # -- Resource requests and limits for the Receive container.
  # @default -- {}
  resources: {}

  # -- Additional CLI arguments appended to the `thanos receive` command.
  # @default -- []
  extraArgs: []

  # Pod security context for Receive pods. Overrides global.podSecurityContext.
  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

  # -- Container security context for Receive. Overrides global.containerSecurityContext.
  # @default -- {}
  containerSecurityContext: {}

  # -- DNS configuration for Receive pods. Overrides global.dnsConfig.
  # @default -- {}
  dnsConfig: {}

  # -- Extra environment variables injected into the Receive container.
  # @default -- []
  extraEnv: []

  # -- Extra environment variable sources for the Receive container.
  # @default -- []
  extraEnvFrom: []

  # -- Extra init containers for Receive pods.
  # @default -- []
  extraInitContainers: []

  # -- Extra sidecar containers for Receive pods.
  # @default -- []
  extraContainers: []

  # Health and readiness probe configuration for the Receive component.
  probes:
    # Readiness probe for the Receive component.
    readiness:
      # -- Enable the readiness probe for Receive.
      enabled: true
      # -- HTTP path checked by the Receive readiness probe.
      path: /-/ready
      # -- Seconds to wait before starting the Receive readiness probe.
      initialDelaySeconds: 5
      # -- How often (seconds) to run the Receive readiness probe.
      periodSeconds: 10
      # -- Seconds after which the Receive readiness probe times out.
      timeoutSeconds: 5
      # -- Consecutive failures before the Receive pod is marked not-ready.
      failureThreshold: 6
      # -- Consecutive successes before the Receive pod is marked ready.
      successThreshold: 1
    # Liveness probe for the Receive component.
    liveness:
      # -- Enable the liveness probe for Receive.
      enabled: true
      # -- HTTP path checked by the Receive liveness probe.
      path: /-/healthy
      # -- Seconds to wait before starting the Receive liveness probe.
      initialDelaySeconds: 30
      # -- How often (seconds) to run the Receive liveness probe.
      periodSeconds: 10
      # -- Seconds after which the Receive liveness probe times out.
      timeoutSeconds: 5
      # -- Consecutive failures before the Receive container is restarted.
      failureThreshold: 6
      # -- Consecutive successes before the Receive container is considered live.
      successThreshold: 1
    # Startup probe for the Receive component.
    startup:
      # -- Enable the startup probe for Receive.
      enabled: true
      # -- HTTP path checked by the Receive startup probe.
      path: /-/ready
      # -- Seconds to wait before starting the Receive startup probe.
      initialDelaySeconds: 0
      # -- How often (seconds) to run the Receive startup probe.
      periodSeconds: 5
      # -- Seconds after which the Receive startup probe times out.
      timeoutSeconds: 5
      # -- Consecutive failures during Receive startup before the container is killed.
      failureThreshold: 60
      # -- Consecutive successes before the Receive startup probe is considered passed.
      successThreshold: 1

  # -- Node selector for Receive pod scheduling.
  # @default -- {}
  nodeSelector: {}

  # -- Tolerations for Receive pod scheduling.
  # @default -- []
  tolerations: []

  # -- Affinity rules for Receive pod scheduling.
  # @default -- {}
  affinity: {}

  # -- Topology spread constraints for Receive pods.
  # @default -- []
  topologySpreadConstraints: []

  # -- Priority class name for Receive pods.
  priorityClassName: ""

  # -- Extra volumes for Receive pods.
  # @default -- []
  extraVolumes: []

  # -- Extra volume mounts for the Receive container.
  # @default -- []
  extraVolumeMounts: []

  # -- Extra annotations applied to Receive resources.
  # @default -- {}
  annotations: {}

  # -- Extra labels applied to Receive resources.
  # @default -- {}
  labels: {}

  # -- Extra labels applied to Receive pods (e.g. for workload identity).
  # In split mode this applies to the Ingester; set `receive.ingester.podLabels`
  # and `receive.router.podLabels` to target each workload independently.
  # @default -- {}
  podLabels: {}

  # Prometheus Operator ServiceMonitor configuration for the Receive component.
  serviceMonitor:
    # -- Enable a Prometheus Operator ServiceMonitor for Receive.
    enabled: false
    # -- Extra labels for the Receive ServiceMonitor.
    # @default -- {}
    labels: {}
    # -- Extra annotations for the Receive ServiceMonitor.
    # @default -- {}
    annotations: {}
    # -- Scrape interval for Receive. Empty uses the Prometheus operator default.
    interval: ""
    # -- Scrape timeout for Receive. Empty uses the Prometheus operator default.
    scrapeTimeout: ""
    # -- Scrape scheme for Receive (http or https).
    scheme: ""
    # -- TLS configuration for Receive scraping.
    # @default -- {}
    tlsConfig: {}
    # -- Relabeling rules applied before Receive metrics are ingested.
    # @default -- []
    relabelings: []
    # -- Metric relabeling rules applied after Receive metrics are ingested.
    # @default -- []
    metricRelabelings: []

  # PodDisruptionBudget configuration for the Receive component.
  pdb:
    # -- Enable a PodDisruptionBudget for Receive.
    enabled: false
    # -- (int or string) Minimum available Receive pods during a disruption.
    minAvailable: ""
    # -- (int or string) Maximum unavailable Receive pods during a disruption.
    maxUnavailable: ""

  # ======================================================================
  # Receive Ingester (only used when `receive.mode` is `split`).
  # Stateful workload that stores samples in the local TSDB WAL and ships
  # blocks to the object store. In `split` mode this block REPLACES the
  # top-level `receive.*` fields above for the Ingester StatefulSet; the
  # schema requires it to be populated when mode=split.
  #
  # The accepted shape mirrors the top-level `receive.*` fields
  # (replicaCount, minReadySeconds, tsdb, hashrings, service, ingress, httpRoute, grpcRoute,
  # vpa, persistence, resources, extraArgs, podSecurityContext,
  # containerSecurityContext, dnsConfig, extraEnv, extraEnvFrom,
  # extraInitContainers, extraContainers, probes, nodeSelector, tolerations,
  # affinity, topologySpreadConstraints, priorityClassName, extraVolumes,
  # extraVolumeMounts, annotations, labels, serviceMonitor, pdb,
  # tenancyHeader). Leave empty (`{}`) in standalone mode.
  # ======================================================================
  # -- Ingester StatefulSet config. Required when `receive.mode` is `split`;
  # ignored in `standalone` mode.
  # @default -- {}
  ingester: {}
  # Example (split mode):
  # ingester:
  #   replicaCount: 3
  #   podLabels:
  #     azure.workload.identity/use: "true"
  #   tsdb:
  #     retention: 24h
  #     walCompression: true
  #   service:
  #     grpcPort: 10901
  #     httpPort: 10902
  #     remoteWritePort: 10908
  #   persistence:
  #     enabled: true
  #     size: 10Gi
  #   hashrings:
  #     autogen:
  #       enabled: true

  # ======================================================================
  # Receive Router (only used when `receive.mode` is `split`).
  # Stateless Deployment that fronts the Ingester StatefulSet, exposes the
  # remote-write endpoint to clients, and forwards requests according to the
  # hashring configuration (with optional replication).
  # ======================================================================
  router:
    # -- Number of Router pod replicas. Routers are stateless so scale
    # horizontally based on incoming write throughput.
    replicaCount: 2

    # -- Replication factor used when forwarding writes to Ingesters.
    # Each write is sent to this many Ingesters. Must be <= ingester replicaCount.
    replicationFactor: 1

    # Kubernetes Service configuration for the Router component.
    service:
      # -- Kubernetes Service type for the Router component.
      type: ClusterIP
      # -- HTTP port exposed by the Router Service (metrics, probes).
      httpPort: 10902
      # -- Remote-write ingestion port exposed by the Router Service.
      remoteWritePort: 10908
      # -- Extra annotations for the Router Service.
      # @default -- {}
      annotations: {}
      # -- Extra labels for the Router Service.
      # @default -- {}
      labels: {}

    # Kubernetes Ingress configuration for the Router HTTP/remote-write endpoint.
    ingress:
      http:
        # -- Enable a Kubernetes Ingress for the Router HTTP endpoint.
        enabled: false
        # -- Ingress class name for Router HTTP endpoint.
        className: ""
        # -- Extra annotations for the Router HTTP Ingress.
        # @default -- {}
        annotations: {}
        # Host rules for the Router HTTP Ingress.
        hosts:
          - host: thanos-receive-router.local
            paths:
              - path: /
                pathType: Prefix
        # -- TLS configuration for the Router HTTP Ingress.
        # @default -- []
        tls: []

      remoteWrite:
        # -- Enable a Kubernetes Ingress for the Router remote-write endpoint.
        enabled: false
        # -- Ingress class name for Router remote-write endpoint.
        className: ""
        # -- Extra annotations for the Router remote-write Ingress.
        # @default -- {}
        annotations: {}
        # Host rules for the Router remote-write Ingress.
        hosts:
          - host: thanos-receive-router-remote-write.local
            paths:
              - path: /
                pathType: Prefix
        # -- TLS configuration for the Router remote-write Ingress.
        # @default -- []
        tls: []

    # Gateway API HTTPRoute configuration for the Router HTTP endpoint.
    httpRoute:
      # -- Enable a Gateway API HTTPRoute for the Router HTTP endpoint.
      enabled: false
      # -- Annotations for the Router HTTPRoute resource.
      # @default -- {}
      annotations: {}
      # -- Gateway parentRefs for the Router HTTPRoute.
      # @default -- []
      parentRefs: []
      # Example:
      # parentRefs:
      #   - name: my-gateway
      #     namespace: gateway-system
      #     sectionName: https
      # -- Hostnames to match on the Router HTTPRoute.
      # @default -- []
      hostnames: []
      # Example:
      # hostnames:
      #   - receive-router.example.com
      # -- Gateway matches for the Router HTTPRoute rules.
      # @default -- []
      matches: []
      # Example:
      # matches:
      #   - path:
      #       type: PathPrefix
      #       value: /
      # -- Gateway filters for the Router HTTPRoute rules.
      # @default -- []
      filters: []
      # Example:
      # filters:
      #   - type: RequestHeaderModifier
      #     requestHeaderModifier:
      #       add:
      #         - name: X-Forwarded-Proto
      #           value: https
      # -- Additional custom rules for Router HTTPRoute
      # Each item should be a complete HTTPRouteRule object with
      # its own backendRefs, matches, filters, etc.
      # @default -- []
      extraRules: []
      # Example:
      # extraRules:
      #   - backendRefs:
      #       - name: other-service
      #         port: 80
      #     matches:
      #       - path:
      #           type: PathPrefix
      #           value: /api

    # VerticalPodAutoscaler configuration for the Router Deployment.
    vpa:
      # -- Enable a VerticalPodAutoscaler for the Router Deployment.
      enabled: false
      # -- Kubernetes workload kind targeted by the Router VPA.
      targetKind: Deployment
      # -- VPA update mode for Router. One of Auto, Off, or Initial.
      updateMode: Auto
      # Minimum resource limits enforced by the Router VPA.
      minAllowed:
        # -- Minimum CPU resource enforced by the Router VPA.
        cpu: 100m
        # -- Minimum memory resource enforced by the Router VPA.
        memory: 256Mi
      # Maximum resource limits enforced by the Router VPA.
      maxAllowed:
        # -- Maximum CPU resource enforced by the Router VPA.
        cpu: "2"
        # -- Maximum memory resource enforced by the Router VPA.
        memory: 4Gi

    # -- Resource requests and limits for the Router container.
    # @default -- {}
    resources: {}

    # -- Additional CLI arguments appended to the `thanos receive` command for the Router.
    # @default -- []
    extraArgs: []

    # -- Pod security context for Router pods. Falls back to receive.podSecurityContext, then global.podSecurityContext.
    # @default -- {}
    podSecurityContext: {}

    # -- Container security context for the Router container. Falls back to receive.containerSecurityContext, then global.containerSecurityContext.
    # @default -- {}
    containerSecurityContext: {}

    # Health and readiness probe configuration for the Router.
    probes:
      # Readiness probe for the Router.
      readiness:
        # -- Enable the readiness probe for Router.
        enabled: true
        # -- HTTP path checked by the Router readiness probe.
        path: /-/ready
        # -- Seconds to wait before starting the Router readiness probe.
        initialDelaySeconds: 5
        # -- How often (seconds) to run the Router readiness probe.
        periodSeconds: 10
        # -- Seconds after which the Router readiness probe times out.
        timeoutSeconds: 5
        # -- Consecutive failures before the Router pod is marked not-ready.
        failureThreshold: 6
        # -- Consecutive successes before the Router pod is marked ready.
        successThreshold: 1
      # Liveness probe for the Router.
      liveness:
        # -- Enable the liveness probe for Router.
        enabled: true
        # -- HTTP path checked by the Router liveness probe.
        path: /-/healthy
        # -- Seconds to wait before starting the Router liveness probe.
        initialDelaySeconds: 30
        # -- How often (seconds) to run the Router liveness probe.
        periodSeconds: 10
        # -- Seconds after which the Router liveness probe times out.
        timeoutSeconds: 5
        # -- Consecutive failures before the Router container is restarted.
        failureThreshold: 6
        # -- Consecutive successes before the Router container is considered live.
        successThreshold: 1
      # Startup probe for the Router.
      startup:
        # -- Enable the startup probe for Router.
        enabled: true
        # -- HTTP path checked by the Router startup probe.
        path: /-/ready
        # -- Seconds to wait before starting the Router startup probe.
        initialDelaySeconds: 0
        # -- How often (seconds) to run the Router startup probe.
        periodSeconds: 5
        # -- Seconds after which the Router startup probe times out.
        timeoutSeconds: 5
        # -- Consecutive failures during Router startup before the container is killed.
        failureThreshold: 60
        # -- Consecutive successes before the Router startup probe is considered passed.
        successThreshold: 1

    # -- DNS configuration for Router pods. Falls back to receive.dnsConfig.
    # @default -- {}
    dnsConfig: {}

    # -- Extra environment variables injected into the Router container.
    # @default -- []
    extraEnv: []

    # -- Extra environment variable sources for the Router container.
    # @default -- []
    extraEnvFrom: []

    # -- Extra init containers for Router pods.
    # @default -- []
    extraInitContainers: []

    # -- Extra sidecar containers for Router pods.
    # @default -- []
    extraContainers: []

    # -- Node selector for Router pod scheduling. Falls back to receive.nodeSelector.
    # @default -- {}
    nodeSelector: {}

    # -- Tolerations for Router pod scheduling. Falls back to receive.tolerations.
    # @default -- []
    tolerations: []

    # -- Affinity rules for Router pod scheduling. Falls back to receive.affinity.
    # @default -- {}
    affinity: {}

    # -- Topology spread constraints for Router pods. Falls back to receive.topologySpreadConstraints.
    # @default -- []
    topologySpreadConstraints: []

    # -- Priority class name for Router pods. Falls back to receive.priorityClassName.
    priorityClassName: ""

    # -- Extra volumes for Router pods.
    # @default -- []
    extraVolumes: []

    # -- Extra volume mounts for the Router container.
    # @default -- []
    extraVolumeMounts: []

    # -- Extra annotations applied to Router resources.
    # @default -- {}
    annotations: {}

    # -- Extra labels applied to Router resources.
    # @default -- {}
    labels: {}

    # -- Extra labels applied to Router pods (e.g. for workload identity).
    # @default -- {}
    podLabels: {}

    # Prometheus Operator ServiceMonitor configuration for the Router.
    serviceMonitor:
      # -- Enable a Prometheus Operator ServiceMonitor for Router.
      enabled: false
      # -- Extra labels for the Router ServiceMonitor.
      # @default -- {}
      labels: {}
      # -- Extra annotations for the Router ServiceMonitor.
      # @default -- {}
      annotations: {}
      # -- Scrape interval for Router. Empty uses the Prometheus operator default.
      interval: ""
      # -- Scrape timeout for Router. Empty uses the Prometheus operator default.
      scrapeTimeout: ""
      # -- Scrape scheme for Router (http or https).
      scheme: ""
      # -- TLS configuration for Router scraping.
      # @default -- {}
      tlsConfig: {}
      # -- Relabeling rules applied before Router metrics are ingested.
      # @default -- []
      relabelings: []
      # -- Metric relabeling rules applied after Router metrics are ingested.
      # @default -- []
      metricRelabelings: []

    # PodDisruptionBudget configuration for the Router.
    pdb:
      # -- Enable a PodDisruptionBudget for Router.
      enabled: false
      # -- (int or string) Minimum available Router pods during a disruption.
      minAvailable: ""
      # -- (int or string) Maximum unavailable Router pods during a disruption.
      maxUnavailable: ""

# ======================================================================
# Ruler component
# Evaluates alerting and recording rules by querying the Query component
# and sends alerts to Alertmanager, mirroring Prometheus rule evaluation.
# ======================================================================
# Ruler component — evaluates alerting and recording rules against the Query component.
ruler:
  # -- Enable the Ruler StatefulSet.
  enabled: false

  # -- Number of Ruler pod replicas. Multiple replicas require consistent
  # rule distribution to avoid duplicate alerts.
  replicaCount: 2

  # -- Minimum number of seconds for which a newly created Ruler Pod must be
  # Running and Ready, without any container crashing, before it is considered
  # available during a rolling update (StatefulSet `spec.minReadySeconds`).
  # Defaults to 0 (available as soon as Ready); the field is omitted when 0.
  # See https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#minimum-ready-seconds
  minReadySeconds: 0

  # Query endpoint configuration used by the Ruler to evaluate rules.
  query:
    # -- List of Query component base URLs used by the Ruler to evaluate rules.
    # @default -- []
    urls: []

  # Alertmanager routing configuration in Thanos format.
  # See https://thanos.io/tip/components/rule.md/#flags for the full schema.
  alertmanagers:
    config: |
      alertmanagers:
        - static_configs:
            - alertmanager.monitoring.svc.cluster.local:9093
          scheme: http
          api_version: v2

  # -- URL used in rule alert annotations to link back to a Thanos query UI.
  alertQueryUrl: ""

  # Inline rule files loaded by the Ruler. Keys are filenames; values are
  # PrometheusRule-compatible YAML content. Use external ConfigMap volumes
  # for large or frequently updated rule sets.
  rules:
    example-alerts.yaml: |
      groups:
        - name: thanos-example
          rules:
            - alert: ExampleAlwaysFiring
              expr: vector(1)
              for: 1m
              labels:
                severity: warning
              annotations:
                summary: Example alert firing

  # Auto-import PrometheusRule CRDs from the cluster into the Ruler config.
  autoImportPrometheusRules:
    # -- Enable automatic import of PrometheusRule CRDs from the cluster into
    # the Ruler. Requires kube-prometheus-stack (or any Prometheus Operator
    # deployment) to be present in the cluster.
    enabled: true
    # -- Label selector used to filter which PrometheusRule CRDs are imported.
    # Empty selector imports all PrometheusRule resources visible to the sidecar.
    # @default -- {}
    labelSelector: {}
    # kubectl sidecar container that reads PrometheusRule CRDs from the cluster.
    sidecar:
      # Container image for the kubectl sidecar used by autoImportPrometheusRules.
      image:
        # -- Docker Registry for the kubectl sidecar that reads PrometheusRule CRDs (e.g. docker.io).  Empty means default registry.
        registry: "docker.io"
        # -- Repository for the kubectl sidecar that reads PrometheusRule CRDs.
        repository: alpine/kubectl
        # -- Tag for the kubectl sidecar image.
        tag: latest
        # -- Image pull policy for the kubectl sidecar.
        pullPolicy: IfNotPresent

      # -- Resource requests and limits for the prometheus-rules sidecar.
      # @default -- {}
      resources: {}

  # PersistentVolumeClaim configuration for the Ruler data directory.
  persistence:
    # -- Enable a PersistentVolumeClaim for the Ruler data directory.
    enabled: true
    # -- Storage capacity for the Ruler PVC.
    size: 10Gi
    # -- StorageClass name for the Ruler PVC. Empty uses the cluster default.
    storageClass: "local-path"
    # -- [Volume attributes class](https://kubernetes.io/docs/concepts/storage/volume-attributes-classes/) name for the Ruler PVC. Requires Kubernetes 1.31+ ([with feature gate](https://kubernetes.io/docs/reference/command-line-tools-reference/feature-gates/#feature-gates-for-graduated-or-deprecated-features)) or 1.36+. Chart will fail if provided but not supported by cluster.
    volumeAttributesClassName: ""
    # Access modes for the Ruler PVC.
    accessModes:
      - ReadWriteOnce

  # Kubernetes Service configuration for the Ruler component.
  service:
    # -- Kubernetes Service type for the Ruler component.
    type: ClusterIP
    # -- gRPC Store API port exposed by the Ruler headless Service.
    grpcPort: 10901
    # -- HTTP port exposed by the Ruler Service.
    httpPort: 10902
    # -- Extra annotations for the Ruler Service.
    # @default -- {}
    annotations: {}
    # -- Extra labels for the Ruler Service.
    # @default -- {}
    labels: {}

  # Kubernetes Ingress configuration for the Ruler HTTP endpoint.
  ingress:
    # -- Enable a Kubernetes Ingress for the Ruler HTTP endpoint.
    enabled: false
    # -- Ingress class name for Ruler (e.g. nginx, traefik).
    className: ""
    # -- Extra annotations for the Ruler Ingress.
    # @default -- {}
    annotations: {}
    # Host rules for the Ruler Ingress.
    hosts:
      - host: thanos-ruler.local
        paths:
          - path: /
            pathType: Prefix
    # -- TLS configuration for the Ruler Ingress.
    # @default -- []
    tls: []

  # Gateway API HTTPRoute configuration for the Ruler HTTP endpoint.
  httpRoute:
    # -- Enable a Gateway API HTTPRoute for the Ruler HTTP endpoint.
    enabled: false
    # -- Annotations for the Ruler HTTPRoute resource.
    # @default -- {}
    annotations: {}
    # -- Gateway parentRefs for the Ruler HTTPRoute.
    # @default -- []
    parentRefs: []
    # Example:
    # parentRefs:
    #   - name: my-gateway
    #     namespace: gateway-system
    #     sectionName: https
    # -- Hostnames to match on the Ruler HTTPRoute.
    # @default -- []
    hostnames: []
    # Example:
    # hostnames:
    #   - ruler.example.com
    # -- Gateway matches for the Ruler HTTPRoute rules.
    # @default -- []
    matches: []
    # Example:
    # matches:
    #   - path:
    #       type: PathPrefix
    #       value: /
    # -- Gateway filters for the Ruler HTTPRoute rules.
    # @default -- []
    filters: []
    # Example:
    # filters:
    #   - type: RequestHeaderModifier
    #     requestHeaderModifier:
    #       add:
    #         - name: X-Forwarded-Proto
    #           value: https
    # -- Additional custom rules for Ruler HTTPRoute
    # Each item should be a complete HTTPRouteRule object with
    # its own backendRefs, matches, filters, etc.
    # @default -- []
    extraRules: []
    # Example:
    # extraRules:
    #   - backendRefs:
    #       - name: other-service
    #         port: 80
    #     matches:
    #       - path:
    #           type: PathPrefix
    #           value: /api

  # -- Resource requests and limits for the Ruler container.
  # @default -- {}
  resources: {}

  # -- Additional CLI arguments appended to the `thanos rule` command.
  # @default -- []
  extraArgs: []

  # Pod security context for Ruler pods. Overrides global.podSecurityContext.
  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

  # -- Container security context for Ruler. Overrides global.containerSecurityContext.
  # @default -- {}
  containerSecurityContext: {}

  # -- DNS configuration for Ruler pods. Overrides global.dnsConfig.
  # @default -- {}
  dnsConfig: {}

  # -- Extra environment variables injected into the Ruler container.
  # @default -- []
  extraEnv: []

  # -- Extra environment variable sources for the Ruler container.
  # @default -- []
  extraEnvFrom: []

  # -- Extra init containers for Ruler pods.
  # @default -- []
  extraInitContainers: []

  # -- Extra sidecar containers for Ruler pods.
  # @default -- []
  extraContainers: []

  # Health and readiness probe configuration for the Ruler component.
  probes:
    # Readiness probe for the Ruler component.
    readiness:
      # -- Enable the readiness probe for the Ruler.
      enabled: true
      # -- HTTP path checked by the Ruler readiness probe.
      path: /-/ready
      # -- Seconds to wait before starting the Ruler readiness probe.
      initialDelaySeconds: 5
      # -- How often (seconds) to run the Ruler readiness probe.
      periodSeconds: 10
      # -- Seconds after which the Ruler readiness probe times out.
      timeoutSeconds: 5
      # -- Consecutive failures before the Ruler pod is marked not-ready.
      failureThreshold: 6
      # -- Consecutive successes before the Ruler pod is marked ready.
      successThreshold: 1
    # Liveness probe for the Ruler component.
    liveness:
      # -- Enable the liveness probe for the Ruler.
      enabled: true
      # -- HTTP path checked by the Ruler liveness probe.
      path: /-/healthy
      # -- Seconds to wait before starting the Ruler liveness probe.
      initialDelaySeconds: 30
      # -- How often (seconds) to run the Ruler liveness probe.
      periodSeconds: 10
      # -- Seconds after which the Ruler liveness probe times out.
      timeoutSeconds: 5
      # -- Consecutive failures before the Ruler container is restarted.
      failureThreshold: 6
      # -- Consecutive successes before the Ruler container is considered live.
      successThreshold: 1
    # Startup probe for the Ruler component.
    startup:
      # -- Enable the startup probe for the Ruler.
      enabled: true
      # -- HTTP path checked by the Ruler startup probe.
      path: /-/ready
      # -- Seconds to wait before starting the Ruler startup probe.
      initialDelaySeconds: 0
      # -- How often (seconds) to run the Ruler startup probe.
      periodSeconds: 5
      # -- Seconds after which the Ruler startup probe times out.
      timeoutSeconds: 5
      # -- Consecutive failures during Ruler startup before the container is killed.
      failureThreshold: 60
      # -- Consecutive successes before the Ruler startup probe is considered passed.
      successThreshold: 1

