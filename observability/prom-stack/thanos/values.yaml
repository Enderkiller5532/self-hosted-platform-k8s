
global:
  image:
    registry: "quay.io"
    repository: "thanos/thanos"
    tag: ""
    pullPolicy: IfNotPresent
  clusterDomain: "cluster.local"
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
  dnsConfig: {}
  # Example:
  # dnsConfig:
  #   options:
  #     - name: ndots
  #       value: "1"

  # -- Additional volumes available to every pod by default.
  # @default -- []
  extraVolumes: []

  # -- Additional volume mounts added to every main container by default.
  # @default -- []
  extraVolumeMounts: []

  # -- Default resource requests and limits. Override per component as needed.
  # @default -- {}
  resources: {}

  # -- Node selector applied to every pod by default.
  # @default -- {}
  nodeSelector: {}

  # -- Toleration rules applied to every pod by default.
  # @default -- []
  tolerations: []

  # -- Affinity rules applied to every pod by default.
  # @default -- {}
  affinity: {}

  # -- Topology spread constraints applied to every pod by default.
  # @default -- []
  topologySpreadConstraints: []

  # -- Priority class name applied to every pod by default.
  priorityClassName: ""

  # -- Extra environment variables injected into every main container by default.
  # @default -- []
  extraEnv: []

  # -- Extra environment variable sources (ConfigMap, Secret) for every main container.
  # @default -- []
  extraEnvFrom: []

  # -- Extra init containers added to every pod by default.
  # @default -- []
  extraInitContainers: []

  # -- Extra sidecar containers added to every pod by default.
  # @default -- []
  extraContainers: []

  # -- Create a NetworkPolicy for every enabled component. When true each
  # component gets a NetworkPolicy that allows ingress on its service ports
  # from within the namespace and permits all egress.
  networkPolicies: false

  # Object store configuration shared by all components that read or write
  # blocks (Receive, Store Gateway, Compactor, Ruler).
  # Object store configuration block shared by all Thanos components.
  objstore:
    # -- When true, the chart creates a Kubernetes Secret named `secretName`
    # containing the inline `config` below. Set to false when the Secret is
    # managed externally (Vault, External Secrets Operator, kubectl, etc.).
    createSecret: false

    # -- Name of the Kubernetes Secret that carries the object store config.
    # All components mount this Secret as a file.
    secretName: thanos-objstore

    # -- Key inside the Secret whose value is the object store YAML.
    secretKey: objstore.yml

    # -- Inline object store configuration rendered into the Secret when
    # `createSecret` is true. Processed via `tpl`, so Helm template syntax
    # (e.g. `{{ .Release.Name }}`) is valid inside the string.
    # Refer to https://thanos.io/tip/thanos/storage.md/ for the full schema.
    config: |
      type: GCS
      config:
        bucket: change-me
        endpoint: storage.googleapis.com
        region: eu-west-1
        insecure: false

      # Example for S3
      # type: S3
      # config:
      #   bucket: my-s3-bucket
      #   endpoint: s3.eu-west-1.amazonaws.com
      #   region: eu-west-1
      #   access_key: myaccess
      #   secret_key: mysecret

  # RBAC and ServiceAccount defaults.
  # RBAC configuration applied globally across all components.
  rbac:
    # -- Create RBAC resources (ClusterRole, ClusterRoleBinding) required by
    # components that need cluster-level access (e.g. Ruler auto-import).
    create: true

  # ServiceAccount configuration applied to every component by default.
  serviceAccount:
    # -- Create a dedicated ServiceAccount for each component.
    create: true
    # -- Extra annotations merged into every ServiceAccount.
    # @default -- {}
    annotations: {}
    # -- Name override for all ServiceAccounts. Empty means auto-generate
    # per-component names based on the release name.
    name: ""

  # Built-in Thanos alerting rules deployed as PrometheusRule CRDs.
  # Requires the Prometheus Operator to be installed in the cluster.
  # Alerts are sourced from the upstream Thanos monitoring-mixin
  # (https://github.com/monitoring-mixins/website/blob/master/assets/thanos/alerts.yaml)
  # and grouped per Thanos component. Each group can be toggled
  # independently and decorated with extra labels and annotations.
  thanosRules:
    # -- Deploy a PrometheusRule resource with built-in Thanos alerting rules.
    enabled: true
    # -- Extra labels merged into the PrometheusRule resource metadata.
    # @default -- {}
    labels: {}
    # -- Extra annotations merged into the PrometheusRule resource metadata.
    # @default -- {}
    annotations: {}
    # -- Labels added to every alert rule across all groups. Applied on top
    # of the rule's default labels (severity). Useful for routing alerts
    # to specific Alertmanager receivers (e.g. team, tenant).
    # @default -- {}
    additionalRuleGroupLabels: {}
    # -- Annotations added to every alert rule across all groups. Applied
    # on top of the rule's default annotations (summary, description,
    # runbook_url).
    # @default -- {}
    additionalRuleGroupAnnotations: {}
    # -- List of alert names to exclude from the PrometheusRule. Useful for
    # silencing specific alerts without disabling entire rule groups.
    # @default -- []
    disabledAlerts: []
    # Example:
    # disabledAlerts:
    #   - ThanosCompactMultipleRunning
    #   - ThanosQueryHttpRequestQueryErrorRateHigh
    # -- Per-alert label overrides. Keys are alert names; values are dicts
    # of labels to merge into that alert's labels block. Useful for routing
    # specific alerts to different receivers or adding custom metadata.
    # @default -- {}
    alertOverrides: {}
    # Example:
    # alertOverrides:
    #   ThanosCompactHalted:
    #     severity: critical
    #     team: platform
    #   ThanosQueryOverload:
    #     severity: warning
    #     oncall: query-team
    # -- Severity label values injected into alert rules. Override these to
    # match your Alertmanager routing conventions.
    severity:
      # -- Severity label value used for critical alerts.
      critical: critical
      # -- Severity label value used for warning alerts.
      warning: warning
      # -- Severity label value used for informational alerts.
      info: info
    # Per-group configuration. Each entry maps to a rule group from the
    # Thanos mixin and supports:
    #   - enabled: render the group when true. For groups that map to a
    #     chart component (compact, query, receive, store, rule), the
    #     group is also gated on the component's top-level `enabled`
    #     flag — disabling the component (e.g. ruler.enabled=false)
    #     silences its rule group and its ThanosXIsDown absent alert.
    #   - jobPattern: regex matching the Prometheus `job` label of the
    #     component scrape targets. Defaults assume a job name containing
    #     `thanos` and the component keyword.
    #   - labels / annotations: merged into every alert in the group, on
    #     top of `additionalRuleGroupLabels` / `additionalRuleGroupAnnotations`.
    groups:
      # Compactor alerts (thanos-compact rule group).
      # Also gated on `compactor.enabled`.
      thanosCompact:
        # -- Render the thanos-compact rule group. Also requires `compactor.enabled`.
        enabled: true
        # -- Regex used to match the Prometheus `job` label of compactor scrape targets.
        jobPattern: ".*thanos.*compact.*"
        # -- Extra labels merged into every alert in this group.
        # @default -- {}
        labels: {}
        # -- Extra annotations merged into every alert in this group.
        # @default -- {}
        annotations: {}
      # Query alerts (thanos-query rule group).
      # Also gated on `query.enabled`.
      thanosQuery:
        # -- Render the thanos-query rule group. Also requires `query.enabled`.
        enabled: true
        # -- Regex used to match the Prometheus `job` label of query scrape targets.
        jobPattern: ".*thanos.*query.*"
        # -- Extra labels merged into every alert in this group.
        # @default -- {}
        labels: {}
        # -- Extra annotations merged into every alert in this group.
        # @default -- {}
        annotations: {}
      # Receive alerts (thanos-receive rule group).
      # Also gated on `receive.enabled`.
      thanosReceive:
        # -- Render the thanos-receive rule group. Also requires `receive.enabled`.
        enabled: true
        # -- Regex used to match the Prometheus `job` label of receive scrape targets.
        jobPattern: ".*thanos.*receive.*"
        # -- Extra labels merged into every alert in this group.
        # @default -- {}
        labels: {}
        # -- Extra annotations merged into every alert in this group.
        # @default -- {}
        annotations: {}
      # Sidecar alerts (thanos-sidecar rule group). Disabled by default
      # because this chart does not deploy the Thanos sidecar.
      thanosSidecar:
        # -- Render the thanos-sidecar rule group.
        enabled: false
        # -- Regex used to match the Prometheus `job` label of sidecar scrape targets.
        jobPattern: ".*thanos.*sidecar.*"
        # -- Extra labels merged into every alert in this group.
        # @default -- {}
        labels: {}
        # -- Extra annotations merged into every alert in this group.
        # @default -- {}
        annotations: {}
      # Store gateway alerts (thanos-store rule group).
      # Also gated on `storegateway.enabled`.
      thanosStore:
        # -- Render the thanos-store rule group. Also requires `storegateway.enabled`.
        enabled: true
        # -- Regex used to match the Prometheus `job` label of store gateway scrape targets.
        jobPattern: ".*thanos.*store.*"
        # -- Extra labels merged into every alert in this group.
        # @default -- {}
        labels: {}
        # -- Extra annotations merged into every alert in this group.
        # @default -- {}
        annotations: {}
      # Ruler alerts (thanos-rule rule group).
      # Also gated on `ruler.enabled`.
      thanosRule:
        # -- Render the thanos-rule rule group. Also requires `ruler.enabled`.
        enabled: true
        # -- Regex used to match the Prometheus `job` label of ruler scrape targets.
        jobPattern: ".*thanos.*rule.*"
        # -- Extra labels merged into every alert in this group.
        # @default -- {}
        labels: {}
        # -- Extra annotations merged into every alert in this group.
        # @default -- {}
        annotations: {}
      # Bucket replicate alerts (thanos-bucket-replicate rule group).
      # Disabled by default because this chart does not deploy the
      # bucket-replicate component.
      thanosBucketReplicate:
        # -- Render the thanos-bucket-replicate rule group.
        enabled: false
        # -- Regex used to match the Prometheus `job` label of bucket-replicate scrape targets.
        jobPattern: ".*thanos.*bucket-replicate.*"
        # -- Extra labels merged into every alert in this group.
        # @default -- {}
        labels: {}
        # -- Extra annotations merged into every alert in this group.
        # @default -- {}
        annotations: {}
      # Component absence alerts (thanos-component-absent rule group).
      # Each rule is also gated on the corresponding component group
      # being enabled, so disabling thanosSidecar removes both the
      # sidecar alerts and the ThanosSidecarIsDown rule.
      thanosComponentAbsent:
        # -- Render the thanos-component-absent rule group.
        enabled: true
        # -- Extra labels merged into every alert in this group.
        # @default -- {}
        labels: {}
        # -- Extra annotations merged into every alert in this group.
        # @default -- {}
        annotations: {}

  # ServiceMonitor defaults for Prometheus Operator scraping.
  # Components inherit these defaults and can override per-component.
  # Default ServiceMonitor configuration inherited by all components.
  serviceMonitor:
    # -- Enable a Prometheus Operator ServiceMonitor for every component.
    # Individual components can override this with their own serviceMonitor.enabled.
    enabled: false
    # -- Namespace where ServiceMonitor resources are created.
    # Empty means the same namespace as the release.
    namespace: ""
    # -- Extra labels merged into every ServiceMonitor resource.
    # @default -- {}
    labels: {}
    # -- Extra annotations merged into every ServiceMonitor resource.
    # @default -- {}
    annotations: {}
    # -- Scrape interval. Empty string uses the Prometheus operator default.
    interval: ""
    # -- Scrape timeout. Empty string uses the Prometheus operator default.
    scrapeTimeout: ""
    # -- Scrape scheme: http or https.
    scheme: ""
    # -- TLS configuration for scraping when scheme is https.
    # @default -- {}
    tlsConfig: {}
    # -- Relabeling rules applied to scraped metrics before ingestion.
    # @default -- []
    relabelings: []
    # -- Metric relabeling rules applied after ingestion.
    # @default -- []
    metricRelabelings: []

  # PodDisruptionBudget defaults. Components inherit these and can override per-component.
  # Default PodDisruptionBudget configuration inherited by all components.
  pdb:
    # -- Enable a PodDisruptionBudget for every component. Individual
    # components can override this with their own pdb.enabled.
    enabled: false
    # -- (int or string) Minimum number of available pods during a disruption.
    # Cannot be set at the same time as maxUnavailable.
    minAvailable: ""
    # -- (int or string) Maximum number of unavailable pods during a disruption.
    # Cannot be set at the same time as minAvailable.
    maxUnavailable: ""

# ======================================================================
# Bucket component
# Read-only web UI for inspecting object store blocks.
# Often disabled in production; useful for debugging compaction issues.
# ======================================================================
# Bucket component group. Contains the Bucketweb UI sub-chart.
bucket:
  enabled: true
  bucketweb:
    enabled: true
    replicaCount: 1
    service:
      type: ClusterIP
      port: 10902
      annotations: {}
      labels: {}
    httpRoute:
      # -- Enable a Gateway API HTTPRoute for Bucketweb (alternative to Ingress).
      enabled: false
      # -- Annotations for the HTTPRoute resource.
      # @default -- {}
      annotations: {}
      # -- Gateway parentRefs the HTTPRoute should attach to.
      # @default -- []
      parentRefs: []
      # Example:
      # parentRefs:
      #   - name: my-gateway
      #     namespace: gateway-system
      #     sectionName: https
      # -- Hostnames to match. Empty matches all hostnames on the parent Gateway.
      # @default -- []
      hostnames: []
      # Example:
      # hostnames:
      #   - bucketweb.example.com
      # -- Gateway matches HTTPRoute rules match conditions.
      # @default -- []
      matches: []
      # Example:
      # matches:
      #   - path:
      #       type: PathPrefix
      #       value: /
      # -- Gateway filters HTTPRoute rules filter request/response.
      # @default -- []
      filters: []
      # Example:
      # filters:
      #   - type: RequestHeaderModifier
      #     requestHeaderModifier:
      #       add:
      #         - name: X-Forwarded-Proto
      #           value: https
      # -- Additional custom rules for Bucketweb HTTPRoute
      # Each item should be a complete HTTPRouteRule object with
      # its own backendRefs, matches, filters, etc.
      # @default -- []
      extraRules: []
      # Example:
      # extraRules:
      #   - backendRefs:
      #       - name: other-service
      #         port: 80
      #     matches:
      #       - path:
      #           type: PathPrefix
      #           value: /api
    probes:
      readiness:
        enabled: true
        path: /-/ready
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 6
        successThreshold: 1
      liveness:
        enabled: true
        path: /-/healthy
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 6
        successThreshold: 1
      startup:
        enabled: true
        path: /-/ready
        initialDelaySeconds: 0
        periodSeconds: 5
        timeoutSeconds: 5
        failureThreshold: 60
        successThreshold: 1
    serviceMonitor:
      enabled: true
      labels: {}
      annotations: {}
      interval: ""
      scrapeTimeout: ""
      scheme: ""
      tlsConfig: {}
      relabelings: []
      metricRelabelings: []
compactor:
  enabled: true
  replicaCount: 1
  minReadySeconds: 0
  persistence:
    enabled: true
    size: 10Gi
    storageClass: "local-path"
    volumeAttributesClassName: ""
    accessModes:
      - ReadWriteOnce
  service:
    type: ClusterIP
    port: 10902
  vpa:
    enabled: true
    targetKind: StatefulSet
    updateMode: Auto
    minAllowed:
      cpu: 500m
      memory: 512Mi
    maxAllowed:
      cpu: "4"
      memory: 8Gi
  retention:
    # -- Retention for raw resolution blocks (--retention.resolution-raw).
    resolutionRaw: 30d
    # -- Retention for 5m downsampled blocks (--retention.resolution-5m).
    resolution5m: 90d
    # -- Retention for 1h downsampled blocks (--retention.resolution-1h).
    resolution1h: 365d
  extraArgs:
    - --log.level=info
    - --log.format=logfmt
    - --consistency-delay=30m
  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  probes:
    readiness:
      enabled: true
      path: /-/ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      successThreshold: 1
    liveness:
      enabled: true
      path: /-/healthy
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      successThreshold: 1
    startup:
      enabled: true
      path: /-/ready
      initialDelaySeconds: 0
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 60
      successThreshold: 1
  serviceMonitor:
    enabled: true
query:
  enabled: true
  replicaCount: 2
  service:
    type: ClusterIP
    httpPort: 9090
    grpcPort: 10901
  endpoints:
    autogen:
      enabled: true
    # -- Optional static endpoint arguments. When non-empty will be added as extra endpoints.
    # When `query.endpoints.autogen.enabled` is `false`, these will give you full control over the endpoints.
    # @default -- []
    static: []
    # Example
    # static:
    #   - thanos-storegateway.cluster1.internal:443
    #   - thanos-receive.cluster1.internal:443
    #   - thanos-gateway.cluster2.internal:443
    #   - thanos-gateway.cluster3.internal:443

  replicaLabels:
    - prometheus_replica
    - receive_replica
  extraArgs:
    - --log.level=info
  probes:
    # Readiness probe for the Query component.
    readiness:
      # -- Enable the readiness probe for Query.
      enabled: true
      # -- HTTP path checked by the Query readiness probe.
      path: /-/ready
      # -- Seconds to wait before starting the Query readiness probe.
      initialDelaySeconds: 5
      # -- How often (seconds) to run the Query readiness probe.
      periodSeconds: 10
      # -- Seconds after which the Query readiness probe times out.
      timeoutSeconds: 5
      # -- Consecutive failures before the Query pod is marked not-ready.
      failureThreshold: 6
      # -- Consecutive successes before the Query pod is marked ready.
      successThreshold: 1
    # Liveness probe for the Query component.
    liveness:
      # -- Enable the liveness probe for Query.
      enabled: true
      # -- HTTP path checked by the Query liveness probe.
      path: /-/healthy
      # -- Seconds to wait before starting the Query liveness probe.
      initialDelaySeconds: 30
      # -- How often (seconds) to run the Query liveness probe.
      periodSeconds: 10
      # -- Seconds after which the Query liveness probe times out.
      timeoutSeconds: 5
      # -- Consecutive failures before the Query container is restarted.
      failureThreshold: 6
      # -- Consecutive successes before the Query container is considered live.
      successThreshold: 1
    # Startup probe for the Query component.
    startup:
      # -- Enable the startup probe for Query.
      enabled: true
      # -- HTTP path checked by the Query startup probe.
      path: /-/ready
      # -- Seconds to wait before starting the Query startup probe.
      initialDelaySeconds: 0
      # -- How often (seconds) to run the Query startup probe.
      periodSeconds: 5
      # -- Seconds after which the Query startup probe times out.
      timeoutSeconds: 5
      # -- Consecutive failures during Query startup before the container is killed.
      failureThreshold: 60
      # -- Consecutive successes before the Query startup probe is considered passed.
      successThreshold: 1

  # -- Node selector for Query pod scheduling.
  # @default -- {}
  nodeSelector: {}

  # -- Tolerations for Query pod scheduling.
  # @default -- []
  tolerations: []

  # -- Affinity rules for Query pod scheduling.
  # @default -- {}
  affinity: {}

  # -- Topology spread constraints for Query pods.
  # @default -- []
  topologySpreadConstraints: []

  # -- Priority class name for Query pods.
  priorityClassName: ""

  # -- Extra volumes for Query pods.
  # @default -- []
  extraVolumes: []

  # -- Extra volume mounts for the Query container.
  # @default -- []
  extraVolumeMounts: []

  # -- Extra annotations applied to Query resources.
  # @default -- {}
  annotations: {}

  # -- Extra labels applied to Query resources.
  # @default -- {}
  labels: {}

  # -- Extra labels applied to Query pods (e.g. for workload identity).
  # @default -- {}
  podLabels: {}

  # Prometheus Operator ServiceMonitor configuration for the Query component.
  serviceMonitor:
    # -- Enable a Prometheus Operator ServiceMonitor for Query.
    enabled: true
    # -- Extra labels for the Query ServiceMonitor.
    # @default -- {}
    labels: {}
    # -- Extra annotations for the Query ServiceMonitor.
    # @default -- {}
    annotations: {}
    # -- Scrape interval for Query. Empty uses the Prometheus operator default.
    interval: ""
    # -- Scrape timeout for Query. Empty uses the Prometheus operator default.
    scrapeTimeout: ""
    # -- Scrape scheme for Query (http or https).
    scheme: ""
    # -- TLS configuration for Query scraping.
    # @default -- {}
    tlsConfig: {}
    # -- Relabeling rules applied before Query metrics are ingested.
    # @default -- []
    relabelings: []
    # -- Metric relabeling rules applied after Query metrics are ingested.
    # @default -- []
    metricRelabelings: []

  # PodDisruptionBudget configuration for the Query component.
  pdb:
    # -- Enable a PodDisruptionBudget for Query.
    enabled: false
    # -- (int or string) Minimum available Query pods during a disruption.
    minAvailable: ""
    # -- (int or string) Maximum unavailable Query pods during a disruption.
    maxUnavailable: ""

# ======================================================================
# Query Frontend component
# Optional caching and query-splitting layer in front of Query.
# Reduces load for repeated or heavy long-range queries.
# ======================================================================
# Query Frontend component — optional caching and query-splitting layer in front of Query.
queryFrontend:
  # -- Enable the Query Frontend Deployment.
  enabled: false

  # -- Number of Query Frontend pod replicas.
  replicaCount: 2

  # -- Downstream URL of the Query component. Leave empty to use the
  # in-chart Query service endpoint (auto-resolved).
  downstreamUrl: ""

  # -- Optional result cache configuration (Memcached, Redis, or in-memory)
  # passed as an inline YAML string. See https://thanos.io/tip/components/query-frontend.md/
  cacheConfig: ""

  # Kubernetes Service configuration for the Query Frontend.
  service:
    # -- Kubernetes Service type for Query Frontend.
    type: ClusterIP
    # -- HTTP port exposed by the Query Frontend Service.
    port: 9090
    # -- Extra annotations for the Query Frontend Service.
    # @default -- {}
    annotations: {}
    # -- Extra labels for the Query Frontend Service.
    # @default -- {}
    labels: {}

  # Kubernetes Ingress configuration for the Query Frontend.
  ingress:
    # -- Enable a Kubernetes Ingress for Query Frontend.
    enabled: false
    # -- Ingress class name for Query Frontend (e.g. nginx, traefik).
    className: ""
    # -- Extra annotations for the Query Frontend Ingress.
    # @default -- {}
    annotations: {}
    # Host rules for the Query Frontend Ingress.
    hosts:
      - host: thanos-query-frontend.local
        paths:
          - path: /
            pathType: Prefix
    # -- TLS configuration for the Query Frontend Ingress.
    # @default -- []
    tls: []

  # Gateway API HTTPRoute configuration for the Query Frontend.
  httpRoute:
    # -- Enable a Gateway API HTTPRoute for Query Frontend.
    enabled: false
    # -- Annotations for the Query Frontend HTTPRoute resource.
    # @default -- {}
    annotations: {}
    # -- Gateway parentRefs for the Query Frontend HTTPRoute.
    # @default -- []
    parentRefs: []
    # Example:
    # parentRefs:
    #   - name: my-gateway
    #     namespace: gateway-system
    #     sectionName: https
    # -- Hostnames to match on the Query Frontend HTTPRoute.
    # @default -- []
    hostnames: []
    # Example:
    # hostnames:
    #   - query-frontend.example.com
    # -- Gateway matches for the Query Frontend HTTPRoute rules.
    # @default -- []
    matches: []
    # Example:
    # matches:
    #   - path:
    #       type: PathPrefix
    #       value: /
    # -- Gateway filters for the Query Frontend HTTPRoute rules.
    # @default -- []
    filters: []
    # Example:
    # filters:
    #   - type: RequestHeaderModifier
    #     requestHeaderModifier:
    #       add:
    #         - name: X-Forwarded-Proto
    #           value: https
    # -- Additional custom rules for Query Frontend HTTPRoute
    # Each item should be a complete HTTPRouteRule object with
    # its own backendRefs, matches, filters, etc.
    # @default -- []
    extraRules: []
    # Example:
    # extraRules:
    #   - backendRefs:
    #      - name: other-service
    #         port: 80
    #     matches:
    #       - path:
    #           type: PathPrefix
    #           value: /api

  # HorizontalPodAutoscaler configuration for the Query Frontend.
  autoscaling:
    # -- Enable HorizontalPodAutoscaler for Query Frontend.
    enabled: false
    # -- Minimum number of Query Frontend replicas.
    minReplicas: 2
    # -- Maximum number of Query Frontend replicas.
    maxReplicas: 5
    # -- Target CPU utilisation percentage for Query Frontend autoscaling.
    targetCPUUtilizationPercentage: 80
    # -- Target memory utilisation percentage for Query Frontend autoscaling. Null disables memory-based scaling.
    targetMemoryUtilizationPercentage: null

  # -- Resource requests and limits for the Query Frontend container.
  # @default -- {}
  resources: {}

  # -- Additional CLI arguments appended to the `thanos query-frontend` command.
  # @default -- []
  extraArgs: []

  # -- Pod security context for Query Frontend pods. Overrides global.podSecurityContext.
  # @default -- {}
  podSecurityContext: {}

  # -- Container security context for Query Frontend. Overrides global.containerSecurityContext.
  # @default -- {}
  containerSecurityContext: {}

  # -- DNS configuration for Query Frontend pods. Overrides global.dnsConfig.
  # @default -- {}
  dnsConfig: {}

  # -- Extra environment variables injected into the Query Frontend container.
  # @default -- []
  extraEnv: []

  # -- Extra environment variable sources for the Query Frontend container.
  # @default -- []
  extraEnvFrom: []

  # -- Extra init containers for Query Frontend pods.
