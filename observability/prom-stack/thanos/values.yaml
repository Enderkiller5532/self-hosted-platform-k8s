# ======================================================================
# RustFS subchart (optional local S3-compatible object store)
# Disabled by default. Enable in CI or development environments where no
# external object store is available. See charts/thanos/ci/ci-values.yaml
# for a complete CI configuration example.
# ======================================================================
# RustFS subchart — optional local S3-compatible object store for CI/dev environments.
rustfs:
  # -- Deploy a local RustFS instance as an S3-compatible object store alongside Thanos.
  # Intended for CI and development only. Do not enable in production.
  enabled: false
  # RustFS subchart secret handling. Since rustfs 0.3.0 the subchart refuses
  # to render unless real credentials are supplied (secret.rustfs.access_key /
  # secret_key or secret.existingSecret) or the well-known defaults are opted
  # into. As this instance is for CI/development only and the init-bucket Job
  # below already uses the rustfsadmin defaults, opt in so it renders out of
  # the box. For any real use, set credentials and remove allowInsecureDefaults.
  secret:
    # -- Opt into the well-known default rustfs credentials. Dev/CI only.
    allowInsecureDefaults: true
  initBucket:
    # -- Image used by the init-bucket Job to create the S3 bucket via the RustFS CLI.
    image: "docker.io/rustfs/rc:latest"
    # -- S3 bucket name to create.
    bucketName: thanos
    # -- Name of an existing Secret containing the RustFS credentials.
    # When set, accessKey and secretKey are ignored.
    # The Secret must contain the keys defined in existingSecretKeys.
    existingSecret: ""
    existingSecretKeys:
      # -- Key in the existing Secret for the access key.
      accessKey: access-key
      # -- Key in the existing Secret for the secret key.
      secretKey: secret-key
    # -- RustFS admin username. Ignored when existingSecret is set.
    accessKey: rustfsadmin
    # -- RustFS admin password. Ignored when existingSecret is set.
    secretKey: rustfsadmin

# ======================================================================
# kube-prometheus-stack subchart (optional)
# Deploys the full Prometheus Operator stack (Prometheus, Alertmanager,
# Grafana, node-exporter, kube-state-metrics) alongside Thanos.
# All kube-prometheus-stack values are passed through unchanged.
# Refer to https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack
# for the full values reference.
# ======================================================================
# kube-prometheus-stack subchart — optional full Prometheus Operator deployment.
kube-prometheus-stack:
  # -- Enable the kube-prometheus-stack subchart. Deploys Prometheus Operator
  # and associated components into the same namespace as Thanos.
  enabled: false
