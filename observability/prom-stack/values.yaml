  service:
    ipDualStack:
      enabled: false
      ipFamilies: ["IPv6", "IPv4"]
      ipFamilyPolicy: "PreferDualStack"
    nodePort: 30080
    nodePortTls: 30443
    externalTrafficPolicy: Cluster
    type: ClusterIP
  kubeletService:
    enabled: true
    namespace: kube-system
  kubeletEndpointsEnabled: true
  kubeletEndpointSliceEnabled: true
  serviceMonitor:
