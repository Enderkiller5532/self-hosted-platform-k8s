alertmanager:

  enabled: true
  apiVersion: v2
  forceDeployDashboards: false
  networkPolicy:
    enabled: false
    enableClusterRules: true
    monitoringRules:
      prometheus: true
      configReloader: true
  serviceAccount:
    create: true
    automountServiceAccountToken: true
  podDisruptionBudget:
    enabled: false
  verticalPodAutoscaler:
    enabled: false
    maxAllowed:
     cpu: 200m
     memory: 512Mi
    minAllowed:
     cpu: 100m
     memory: 256Mi

    updatePolicy:
      updateMode: Recreate
  config:
    global:
      resolve_timeout: 5m
    inhibit_rules:
      - source_matchers:
          - 'severity = critical'
        target_matchers:
          - 'severity =~ warning|info'
        equal:
          - 'namespace'
          - 'alertname'
      - source_matchers:
          - 'severity = warning'
        target_matchers:
          - 'severity = info'
        equal:
          - 'namespace'
          - 'alertname'
      - source_matchers:
          - 'alertname = InfoInhibitor'
        target_matchers:
          - 'severity = info'
        equal:
          - 'namespace'
      - target_matchers:
          - 'alertname = InfoInhibitor'
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'telegram-notifications'
      routes:
        - match:
            severity: critical
          receiver: 'telegram-notifications'
    receivers:
    - name: 'telegram-notifications'
      telegram_configs:
      - api_url: 'https://api.telegram.org'
        bot_token: 'YOUR_TELEGRAM_BOT_TOKEN'
        chat_id: YOUR_TELEGRAM_CHAT_ID
        send_resolved: true
        parse_mode: 'HTML'
        message: |
          <b>[Alertmanager] {{ if eq .Status "firing" }}🔥 АЛЕРТ ВСПЫХНУЛ{{ else }}✅ АЛЕРТ ПОТУХ{{ end }}</b>
          <b>Название:</b> {{ .CommonLabels.alertname }}
          <b>Важность:</b> {{ .CommonLabels.severity }}
          {{ range .Alerts }}
          <b>Описание:</b> {{ .Annotations.description }}
          <b>Сводка:</b> {{ .Annotations.summary }}
          <b>Старт:</b> {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}
    templates:
    - '/etc/alertmanager/config/*.tmpl'

  tplConfig: false
  ingress:
    enabled: false
  route:
    main:
      enabled: false
  ingressPerReplica:
    enabled: false
    tlsSecretPerReplica:
      enabled: false
  service:
    enabled: true
    ipDualStack:
      enabled: false
      ipFamilies: ["IPv6", "IPv4"]
      ipFamilyPolicy: "PreferDualStack"
    port: 9093
    targetPort: 9093
    nodePort: 30903
    externalTrafficPolicy: Cluster
    sessionAffinity: None
    sessionAffinityConfig:
      clientIP:
        timeoutSeconds: 10800
    type: ClusterIP

  servicePerReplica:
    enabled: false

  serviceMonitor:
    selfMonitor: true
    sampleLimit: 0
    targetLimit: 0
    labelLimit: 0
    labelNameLengthLimit: 0
    labelValueLengthLimit: 0
    enableHttp2: true

  alertmanagerSpec:
    serviceName:
    image:
      registry: quay.io
      repository: prometheus/alertmanager
      tag: v0.33.0
      sha: ""
      pullPolicy: IfNotPresent
    useExistingSecret: false
    automountServiceAccountToken: true
    logFormat: logfmt
    logLevel: info
    replicas: 1
    retention: 120h
    externalUrl:
    routePrefix: /
    paused: false
    podAntiAffinity: "soft"
    podAntiAffinityTopologyKey: kubernetes.io/hostname
    securityContext:
      runAsGroup: 2000
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 2000
      seccompProfile:
        type: RuntimeDefault
    hostUsers: ~
    hostNetwork: false
    listenLocal: false
    portName: "http-web"
    clusterAdvertiseAddress: false
    forceEnableClusterMode: false
    minReadySeconds: 0
    terminationGracePeriodSeconds: ~
